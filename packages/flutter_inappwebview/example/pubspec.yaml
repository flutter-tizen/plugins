name: flutter_inappwebview_tizen_example
description: Demonstrates how to use the flutter_inappwebview_tizen plugin.
publish_to: "none"

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_inappwebview_tizen:
    path: ../
  flutter_tizen: ^0.2.1
  pointer_interceptor: ^0.10.1+2
  url_launcher: ^6.3.0
  url_launcher_tizen:
    path: ../../url_launcher

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  integration_test_tizen:
    path: ../../integration_test/

flutter:
  uses-material-design: true
