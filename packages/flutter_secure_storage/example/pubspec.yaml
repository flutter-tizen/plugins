name: flutter_secure_storage_tizen_example
description: Demonstrates how to use the flutter_secure_storage_tizen plugin.
publish_to: "none"

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  flutter_secure_storage_tizen:
    path: ../

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  integration_test_tizen:
    path: ../../integration_test/
  flutter_lints: ^4.0.0
  test: any

flutter:
  uses-material-design: true
